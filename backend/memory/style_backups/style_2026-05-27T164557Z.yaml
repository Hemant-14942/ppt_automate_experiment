# PW Presentation Style Memory
# This file is read by the orchestrator at the start of every pipeline run.
# Rules here are passed to every slide-writer agent.
# You can add rules manually, or append them via the QC system.

tone: "educational, clear, direct"
font_style: "concise, no fluff — every word must earn its place"
max_bullets: 5
max_bullet_words: 12

# Structural soft hints (planner picks the actual count and order)
first_slide_must_be: "title_slide"
last_slide_must_be: "thank_you_slide"
prefer_summary_before_thank_you: true
section_heading_only_on_topic_shifts: true
recap_slide_only_if_pdf_mentions_previous_lecture: true
topics_slide_only_if_pdf_lists_agenda: true
homework_slide_only_if_pdf_has_practice_tasks: true

# Content rules (append new rules below as you learn from outputs)
# Example format:
#   - "Always use SI units for Physics"
#   - "In Hinglish: use English for formulas, Hindi for explanations"
learned_rules: []
